<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Error</title>
    <style>
      body { font-family: Arial, sans-serif; margin:0; background:#020617; color:#e5e7eb; }
      .container { max-width:600px; margin:60px auto; padding:24px; background:rgba(15,23,42,0.95); border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.6); }
      .error { color:#ef4444; background:rgba(239,68,68,0.1); padding:12px; border-radius:8px; border-left:3px solid #ef4444; }
      a { color:#bcd9ff; text-decoration:none; }
      a:hover { text-decoration:underline; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Error</h1>
      <div class="error">
        <p>{{ error }}</p>
      </div>
      <p style="margin-top:20px;">
        <a href="/">← Back to Upload</a>
      </p>
    </div>
  </body>
</html>
